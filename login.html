<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Melodify</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/iloveyoujustyou13-debug/melodify--music@main/Ff_Arpon_cover.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            background: var(--bg-elevated);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow);
        }
        .login-container .brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .login-container .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1db954, #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-container .brand p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .login-container .form-group {
            margin-bottom: 1rem;
        }
        .login-container .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.2rem;
        }
        .login-container .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-glass);
            background: var(--bg-highlight);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }
        .login-container .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .login-container .btn-primary {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .login-container .auth-divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1.2rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .login-container .auth-divider::before,
        .login-container .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-glass);
        }
        .login-container .btn-google {
            width: 100%;
            padding: 0.7rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-glass);
            background: var(--bg-highlight);
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .login-container .btn-google:hover {
            background: var(--bg-card-hover);
        }
        .login-container .btn-google i {
            color: #4285f4;
            font-size: 1.1rem;
        }
        .login-container .auth-toggle {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .login-container .auth-toggle a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }
        .login-container .auth-toggle a:hover {
            text-decoration: underline;
        }
        .login-container .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: none;
        }
        .login-container .error-msg.show {
            display: block;
        }
        .login-container .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
        }
        .login-container .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

    <div class="login-page">
        <div class="login-container">
            <div class="brand">
                <h1>🎵 Melodify</h1>
                <p>Sign in to your account</p>
            </div>

            <!-- Login View -->
            <div id="loginView">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required />
                    </div>
                    <div class="error-msg" id="loginError">Invalid credentials. Please try again.</div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>
                <div class="auth-divider">or</div>
                <button class="btn-google" id="googleLoginBtn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
                <div class="auth-toggle">
                    Don't have an account? <a id="switchToSignup">Sign Up</a>
                </div>
            </div>

            <!-- Signup View -->
            <div id="signupView" style="display:none;">
                <form id="signupForm">
                    <div class="form-group">
                        <label for="signupName">Display Name</label>
                        <input type="text" id="signupName" placeholder="Your name" required />
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
                    </div>
                    <div class="error-msg" id="signupError">Something went wrong. Please try again.</div>
                    <button type="submit" class="btn btn-primary" id="signupBtn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>
                <div class="auth-divider">or</div>
                <button class="btn-google" id="googleSignupBtn">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
                <div class="auth-toggle">
                    Already have an account? <a id="switchToLogin">Sign In</a>
                </div>
            </div>

            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
